<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DR. URCW BOT | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <style>
        .register-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .register-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .register-right {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: white;
        }

        .register-card {
            width: 100%;
            max-width: 420px;
        }

        .register-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .register-subtitle {
            color: var(--text-soft);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .brand-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            margin-top: 15px;
            font-size: 16px;
            opacity: 0.9;
            text-align: center;
            max-width: 400px;
        }

        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-soft);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .register-wrapper {
                flex-direction: column;
            }

            .register-right {
                display: none;
            }

            .register-left {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

<div class="register-wrapper">

    <!-- LEFT SIDE (FORM) -->
    <div class="register-left">
        <div class="register-card card-modern">

            <div class="register-title">Create Your Account</div>
            <div class="register-subtitle">Join DR. URCW BOT to access intelligent assistance</div>

            <form method="POST" action="{{ url_for('auth.register') }}">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="input-modern" required>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="input-modern" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="input-modern" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="input-modern" required>
                </div>

                <button type="submit" class="btn-modern" style="width:100%; margin-top:10px;">
                    Register
                </button>

            </form>

            <div class="login-link">
                Already have an account?
                <a href="{{ url_for('auth.login') }}">Login</a>
            </div>

        </div>
    </div>

    <!-- RIGHT SIDE (BRANDING / LOGO AREA) -->
    <div class="register-right">
        <div style="text-align:center;">
            <div class="brand-title">DR. URCW BOT</div>
            <div class="brand-subtitle">
                A structured and intelligent chatbot system designed to provide accurate, reliable, and responsive conversational support.
            </div>
        </div>
    </div>

</div>

</body>
</html>
