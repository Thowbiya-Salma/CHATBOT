<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DR.URCW AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f3f4f6;
}

.wrapper {
    display: flex;
    height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 300px;
    background: linear-gradient(180deg,#3b82f6 0%, #1e3a8a 60%, #0f172a 100%);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 25px 20px;
}

/* LOGO AREA */
.logo-area {
    text-align: center;
    margin-bottom: 20px;
}

.logo-area img {
    width: 110px;
}

.logo-area h5 {
    margin-top: 10px;
    font-weight: 600;
}

.logo-area small {
    font-size: 13px;
    opacity: 0.85;
}

/* USER BOX */
.user-box {
    margin-top: 20px;
    padding: 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    text-align: center;
}

.user-box strong {
    display: block;
    font-size: 14px;
}

.user-box span {
    font-size: 12px;
    opacity: 0.85;
}

/* NEW CHAT BUTTON */
.new-chat-btn {
    margin-top: 20px;
    background: white;
    color: #111827;
    padding: 11px;
    border-radius: 14px;
    text-align: center;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s ease;
}

.new-chat-btn:hover {
    background: #e5e7eb;
}

/* CHAT LIST */
.chat-list {
    flex: 1;
    overflow-y: auto;
    margin-top: 20px;
}

.chat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 14px;
    transition: 0.2s ease;
}

.chat-item:hover {
    background: rgba(255,255,255,0.18);
}

.chat-item.active {
    background: rgba(255,255,255,0.25);
}

.chat-title {
    color: white;
    text-decoration: none;
    font-size: 14px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ===== PREMIUM DROPDOWN ===== */
.dropdown-menu {
    background: rgba(30,41,59,0.97);
    border: none;
    border-radius: 14px;
    padding: 12px;
    min-width: 190px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.dropdown-menu form {
    margin: 0;
}

.dropdown-menu input {
    background: #1e293b;
    border: 1px solid #334155;
    color: white;
    border-radius: 10px;
    padding: 7px 10px;
    font-size: 13px;
    margin-bottom: 10px;
}

.dropdown-menu .btn {
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 13px;
    margin-bottom: 8px;
}

.dropdown-menu hr {
    margin: 8px 0;
    border-color: rgba(255,255,255,0.1);
}

.dropdown-menu input::placeholder {
    color: #94a3b8;
}

.dropdown-menu input:focus {
    background: #1e293b;
    color: white;
    border-color: #3b82f6;
    box-shadow: none;
}



/* FOOTER BUTTONS */
.sidebar-footer {
    margin-top: 15px;
}

.sidebar-footer .btn {
    width: 100%;
    margin-bottom: 8px;
    border-radius: 12px;
}

/* ===== CHAT AREA ===== */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 20px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
}

.chat-body {
    flex: 1;
    padding: 25px;
    overflow-y: auto;
    background: #f8fafc;
}

.message {
    margin-bottom: 15px;
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 70%;
    font-size: 14px;
}

.user {
    background: #2563eb;
    color: white;
    margin-left: auto;
}

.bot {
    background: white;
    border: 1px solid #e5e7eb;
}

/* INPUT */
.chat-input {
    display: flex;
    padding: 20px;
    background: white;
    border-top: 1px solid #e5e7eb;
}

.chat-input input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 30px;
    border: 1px solid #d1d5db;
    margin-right: 10px;
}

.chat-input button {
    border-radius: 30px;
    padding: 10px 25px;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo-area">
        <img src="/static/Images_ss/college_logo.png">
        <h5>DR.URCW BOT</h5>
        <small>Dr. Umayal Ramanathan<br>College for Women</small>
    </div>

    <div class="user-box">
        <strong>{{ user.name }}</strong>
        <span>{{ user.email if user.email else "" }}</span>
    </div>

    <a href="/chatbot" class="new-chat-btn">+ New Chat</a>

    <div class="chat-list">
        {% for s in sessions %}
        <div class="chat-item {% if s.id == active_session %}active{% endif %}">

            <a href="/chatbot?session_id={{ s.id }}" class="chat-title">
                {{ s.title }}
            </a>

            <div class="dropdown">
                <button class="btn btn-sm text-white border-0 bg-transparent"
                        data-bs-toggle="dropdown">
                    ⋮
                </button>

                <div class="dropdown-menu dropdown-menu-end">

                    <form method="post" action="/rename-session">
                        <input type="hidden" name="session_id" value="{{ s.id }}">
                        <input type="text"
                               name="new_title"
                               class="form-control mb-3"
                               placeholder="Enter new title"
                               required>
                        <button class="btn btn-primary w-100 mb-2">
                            Rename
                        </button>
                    </form>

                    <hr style="border-color:#334155;">

                    <form method="post" action="/delete-session">
                        <input type="hidden" name="session_id" value="{{ s.id }}">
                        <button class="btn btn-danger w-100">
                            Delete
                        </button>
                    </form>

                </div>
            </div>

        </div>
        {% endfor %}
    </div>

    <div class="sidebar-footer">
        <a href="/dashboard" class="btn btn-outline-light btn-sm">
            Dashboard
        </a>
        <a href="/logout" class="btn btn-outline-light btn-sm">
            Logout
        </a>
    </div>

</div>

<!-- CHAT AREA -->
<div class="chat-area">

    <div class="chat-header">
        AI Assistant
    </div>

    <div class="chat-body" id="chatBody">
        {% for msg in messages %}
            <div class="message {{ msg.sender }}">
                {{ msg.message | safe }}
            </div>
        {% endfor %}
    </div>

    <form class="chat-input" id="chatForm">
        <input id="msg" placeholder="Type your question..." required>
        <button class="btn btn-primary">Send</button>
    </form>

</div>

</div>

<script>
function scrollBottom(){
    let chat = document.getElementById("chatBody");
    chat.scrollTop = chat.scrollHeight;
}
scrollBottom();

document.getElementById("chatForm").addEventListener("submit", function(e){
    e.preventDefault();

    let msgInput = document.getElementById("msg");
    let msg = msgInput.value.trim();
    if(!msg) return;

    let chatBody = document.getElementById("chatBody");

    chatBody.innerHTML += `<div class="message user">${msg}</div>`;
    msgInput.value="";
    scrollBottom();

    chatBody.innerHTML += `<div id="typing" class="message bot">Typing...</div>`;
    scrollBottom();

    fetch("/chat",{
        method:"POST",
        headers:{ "Content-Type":"application/x-www-form-urlencoded" },
        body:"message="+encodeURIComponent(msg)
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("typing").remove();
        chatBody.innerHTML += `<div class="message bot">${data.reply}</div>`;
        scrollBottom();
    });
});
</script>

</body>
</html>
