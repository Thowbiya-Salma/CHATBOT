{% extends "auth_base.html" %}

{% block content %}

<div class="auth-card">

    <!-- ===============================
         LOGO
    ================================ -->
    <img src="/static/images/logo.png" alt="DR URCW Logo" class="auth-logo">

    <h2>Create Account</h2>
    <p style="color:var(--text-muted); margin-bottom:20px;">
        Join DR. URCW AI Assistant
    </p>

    <!-- ===============================
         ERROR MESSAGE
    ================================ -->
    {% if error %}
        <div style="background:#7F1D1D;
                    padding:10px;
                    border-radius:8px;
                    margin-bottom:15px;
                    font-size:14px;">
            {{ error }}
        </div>
    {% endif %}

    <!-- ===============================
         SUCCESS MESSAGE
    ================================ -->
    {% if success %}
        <div style="background:#065F46;
                    padding:12px;
                    border-radius:8px;
                    margin-bottom:15px;
                    font-size:14px;
                    border-left:4px solid #10B981;">
            ✓ {{ success }}
        </div>
    {% endif %}

    <!-- ===============================
         REGISTER FORM
    ================================ -->
    <form method="POST" action="/register">

        <!-- NAME -->
        <input type="text"
               name="name"
               class="auth-input"
               placeholder="Full Name"
               required>

        <!-- USERNAME -->
        <input type="text"
               name="username"
               class="auth-input"
               placeholder="Username"
               required>

        <!-- EMAIL -->
        <input type="email"
               name="email"
               class="auth-input"
               placeholder="Email"
               required>

        <!-- ROLE (Optional – default student) -->
        <select name="role"
                class="auth-input"
                style="background:#1E293B; color:white;">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
        </select>

        <!-- PASSWORD -->
        <div style="position:relative;">
            <input type="password"
                   name="password"
                   id="register-password"
                   class="auth-input"
                   placeholder="Password"
                   required>

            <span onclick="togglePassword('register-password')"
                  style="position:absolute;
                         right:12px;
                         top:50%;
                         transform:translateY(-50%);
                         cursor:pointer;
                         font-size:13px;
                         color:var(--text-muted);">
                Show
            </span>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div style="position:relative;">
            <input type="password"
                   name="confirm_password"
                   id="register-confirm-password"
                   class="auth-input"
                   placeholder="Confirm Password"
                   required>

            <span onclick="togglePassword('register-confirm-password')"
                  style="position:absolute;
                         right:12px;
                         top:50%;
                         transform:translateY(-50%);
                         cursor:pointer;
                         font-size:13px;
                         color:var(--text-muted);">
                Show
            </span>
        </div>

        <!-- SUBMIT BUTTON -->
        <button type="submit" class="auth-btn">
            Register
        </button>

    </form>

    <!-- ===============================
         LOGIN LINK
    ================================ -->
    <p style="margin-top:20px; font-size:14px; color:var(--text-muted);">
        Already have an account?
        <a href="/login"
           style="color:var(--primary-light); text-decoration:none;">
            Sign in
        </a>
    </p>

</div>


<!-- ===============================
     PASSWORD TOGGLE SCRIPT
================================ -->
<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    const type = input.getAttribute("type") === "password" ? "text" : "password";
    input.setAttribute("type", type);
}
</script>

{% endblock %}
